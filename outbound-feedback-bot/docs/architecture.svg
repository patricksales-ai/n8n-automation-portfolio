<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
    <style>
      .box  { rx:9; ry:9; fill:#ffffff; stroke-width:2; }
      .lbl  { font-size:13px; fill:#0f172a; font-weight:600; }
      .sub  { font-size:11px; fill:#64748b; }
      .lane { font-size:11px; fill:#94a3b8; font-weight:700; letter-spacing:.08em; }
      .flow { stroke:#94a3b8; stroke-width:2; fill:none; }
      .dash { stroke:#cbd5e1; stroke-width:2; fill:none; stroke-dasharray:5 4; }
      .note { font-size:10.5px; fill:#94a3b8; font-style:italic; }
    </style>
  </defs>
  <rect x="0" y="0" width="1140" height="420" fill="#f7f8fa"/>
  <text x="30" y="40" font-size="22" font-weight="700" fill="#0f172a">Outbound Feedback Bot</text>
  <text x="30" y="62" font-size="13" fill="#64748b">AI phones your customers → reads sentiment · qualifies → logs every call, emails the qualified, honors opt-out</text>
  <text class="lane" x="30" y="96">DIALER</text>
  <rect class="box" x="30" y="108" width="172" height="58" stroke="#64748b"/>
  <text class="lbl" x="45" y="133">Trigger</text>
  <text class="sub" x="45" y="151">manual / schedule</text>
  <rect class="box" x="230" y="108" width="172" height="58" stroke="#0f9d58"/>
  <text class="lbl" x="245" y="133">Lead list</text>
  <text class="sub" x="245" y="151">Google Sheets</text>
  <rect class="box" x="430" y="108" width="172" height="58" stroke="#6b46c1"/>
  <text class="lbl" x="445" y="133">DNC guard</text>
  <text class="sub" x="445" y="151">skip do-not-call</text>
  <rect class="box" x="630" y="108" width="186" height="58" stroke="#0ea5a4"/>
  <text class="lbl" x="645" y="133">AI voice call</text>
  <text class="sub" x="645" y="151">HTTP → Vapi · Twilio</text>
  <path class="flow" d="M202,137 H230" marker-end="url(#arrow)"/>
  <path class="flow" d="M402,137 H430" marker-end="url(#arrow)"/>
  <path class="flow" d="M602,137 H630" marker-end="url(#arrow)"/>
  <text class="lane" x="30" y="250">LOGGER  ·  webhook</text>
  <rect class="box" x="30" y="262" width="172" height="58" stroke="#64748b"/>
  <text class="lbl" x="45" y="287">Call ended</text>
  <text class="sub" x="45" y="305">Vapi end-of-call</text>
  <rect class="box" x="230" y="262" width="172" height="58" stroke="#6366f1"/>
  <text class="lbl" x="245" y="287">Fetch transcript</text>
  <text class="sub" x="245" y="305">HTTP → Vapi</text>
  <rect class="box" x="430" y="262" width="172" height="58" stroke="#4b5563"/>
  <text class="lbl" x="445" y="287">Normalize</text>
  <text class="sub" x="445" y="305">flatten fields</text>
  <rect class="box" x="630" y="262" width="186" height="58" stroke="#0f9d58"/>
  <text class="lbl" x="645" y="287">Log every call</text>
  <text class="sub" x="645" y="305">Sheets append</text>
  <path class="flow" d="M202,291 H230" marker-end="url(#arrow)"/>
  <path class="flow" d="M402,291 H430" marker-end="url(#arrow)"/>
  <path class="flow" d="M602,291 H630" marker-end="url(#arrow)"/>
  <rect class="box" x="900" y="198" width="200" height="58" stroke="#ea4335"/>
  <text class="lbl" x="915" y="223">Qualified → email</text>
  <text class="sub" x="915" y="241">Gmail</text>
  <rect class="box" x="900" y="326" width="200" height="58" stroke="#0f9d58"/>
  <text class="lbl" x="915" y="351">Opt-out → DNC</text>
  <text class="sub" x="915" y="369">Google Sheets</text>
  <path class="flow" d="M816,291 H860 V227 H900" marker-end="url(#arrow)"/>
  <path class="flow" d="M816,291 H860 V355 H900" marker-end="url(#arrow)"/>
  <path class="dash" d="M723,166 V210 H150 V262" marker-end="url(#arrow)"/>
  <text class="note" x="150" y="206">Vapi posts the end-of-call report</text>
</svg>
