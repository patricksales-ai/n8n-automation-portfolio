<svg viewBox="0 0 860 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#64748b"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="848" height="668" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="430" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">RAG Customer-Support Chatbot</text>
  <text x="430" y="66" text-anchor="middle" font-size="13" fill="#64748b">Two pipelines, one vector store — ingestion writes, the chatbot reads</text>

  <!-- ===================== INGESTION PANEL ===================== -->
  <rect x="38" y="90" width="784" height="156" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="58" y="116" font-size="12" font-weight="700" fill="#2563eb" letter-spacing="1">INGESTION  ·  scheduled  ·  writes</text>

  <!-- ingestion node boxes -->
  <g font-size="11" fill="#1e3a8a" text-anchor="middle">
    <rect x="58"  y="138" width="110" height="56" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="113" y="162">Schedule</text><text x="113" y="178" font-size="9" fill="#64748b">(cron)</text>

    <rect x="182" y="138" width="110" height="56" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="237" y="160">DELETE FROM</text><text x="237" y="174">documents</text>

    <rect x="306" y="138" width="110" height="56" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="361" y="160">Drive: Search</text><text x="361" y="174">folder</text>

    <rect x="430" y="138" width="110" height="56" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="485" y="160">Drive:</text><text x="485" y="174">Download</text>

    <rect x="554" y="138" width="110" height="56" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="609" y="160">Extract</text><text x="609" y="174">text</text>

    <rect x="678" y="138" width="116" height="56" rx="8" fill="#ffffff" stroke="#3ecf8e"/>
    <text x="736" y="158">Chunk + Embed</text><text x="736" y="172">+ Insert</text><text x="736" y="186" font-size="8" fill="#64748b">OpenAI 1536-d</text>
  </g>
  <!-- arrows between ingestion boxes -->
  <g stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)">
    <line x1="168" y1="166" x2="180" y2="166"/>
    <line x1="292" y1="166" x2="304" y2="166"/>
    <line x1="416" y1="166" x2="428" y2="166"/>
    <line x1="540" y1="166" x2="552" y2="166"/>
    <line x1="664" y1="166" x2="676" y2="166"/>
  </g>

  <!-- writes arrow down to DB -->
  <line x1="430" y1="246" x2="430" y2="296" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="446" y="276" font-size="11" fill="#64748b" font-style="italic">writes</text>

  <!-- ===================== SUPABASE CYLINDER ===================== -->
  <path d="M250,300 v66 a180,18 0 0 0 360,0 v-66" fill="#34b87d" stroke="#1f9d6b"/>
  <ellipse cx="430" cy="300" rx="180" ry="18" fill="#3ecf8e" stroke="#1f9d6b"/>
  <text x="430" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Supabase · public.documents</text>
  <text x="430" y="342" text-anchor="middle" font-size="11" fill="#eafff5">pgvector · vector(1536)</text>
  <text x="430" y="360" text-anchor="middle" font-size="10" fill="#eafff5">{ content, metadata:{fileId, fileName}, embedding }</text>

  <!-- retrieve arrow up from chatbot -->
  <line x1="430" y1="438" x2="430" y2="390" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="446" y="418" font-size="11" fill="#7c3aed" font-style="italic">search_docs · retrieve top-5 (cosine)</text>

  <!-- ===================== CHATBOT PANEL ===================== -->
  <rect x="38" y="440" width="784" height="210" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="58" y="466" font-size="12" font-weight="700" fill="#7c3aed" letter-spacing="1">CHATBOT  ·  on demand  ·  reads</text>

  <g font-size="12" fill="#4c1d95" text-anchor="middle">
    <rect x="58"  y="486" width="130" height="56" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="123" y="510">Chat Trigger</text><text x="123" y="526" font-size="9" fill="#64748b">chatInput · sessionId</text>

    <rect x="240" y="486" width="200" height="56" rx="8" fill="#ffffff" stroke="#a78bfa"/>
    <text x="340" y="510" font-weight="600">AI Agent</text><text x="340" y="526" font-size="9" fill="#64748b">Tools Agent · grounded prompt</text>

    <rect x="560" y="486" width="200" height="56" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="660" y="510">Grounded, cited answer</text><text x="660" y="526" font-size="9" fill="#64748b">or escalate to human</text>
  </g>
  <g stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrowG)">
    <line x1="188" y1="514" x2="238" y2="514"/>
    <line x1="440" y1="514" x2="558" y2="514"/>
  </g>

  <!-- sub-node chips under AI Agent -->
  <g font-size="10" text-anchor="middle">
    <rect x="58"  y="566" width="170" height="28" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="143" y="584" fill="#5b21b6">OpenAI · gpt-4o-mini</text>
    <rect x="242" y="566" width="150" height="28" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="317" y="584" fill="#5b21b6">Simple Memory</text>
    <rect x="406" y="566" width="180" height="28" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="496" y="584" fill="#5b21b6">search_docs → pgvector</text>
    <rect x="600" y="566" width="160" height="28" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="680" y="584" fill="#5b21b6">Embeddings (1536-d)</text>
  </g>
  <text x="340" y="616" text-anchor="middle" font-size="9" fill="#64748b">sub-nodes of the AI Agent — same embedding model as ingestion</text>
</svg>
