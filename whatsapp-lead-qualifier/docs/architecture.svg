<svg width="100%" viewBox="0 0 720 360" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>WhatsApp Lead Qualification Agent architecture</title>
  <desc>Every inbound WhatsApp message loads the lead's saved state, runs a Claude/OpenAI agent that qualifies over multiple turns and writes structured data to Supabase, then replies on WhatsApp. Qualified leads trigger a Slack alert.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7390c2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Band 1: the conversation round-trip -->
  <text x="16" y="28" font-size="12" fill="#5e5e5e">CONVERSATION ROUND-TRIP — runs on every inbound message</text>

  <g>
    <rect x="16" y="42" width="120" height="54" rx="8" fill="#E7F8EF" stroke="#1EA952"/>
    <text x="76" y="66" font-size="13" font-weight="600" fill="#0B6B38" text-anchor="middle">WhatsApp in</text>
    <text x="76" y="83" font-size="11" fill="#1EA952" text-anchor="middle">message received</text>
  </g>
  <g>
    <rect x="156" y="42" width="104" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="208" y="66" font-size="13" font-weight="500" fill="#0C447C" text-anchor="middle">Extract</text>
    <text x="208" y="83" font-size="11" fill="#2D6CB5" text-anchor="middle">phone + text</text>
  </g>
  <g>
    <rect x="280" y="42" width="104" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="332" y="66" font-size="13" font-weight="500" fill="#0C447C" text-anchor="middle">Load state</text>
    <text x="332" y="83" font-size="11" fill="#2D6CB5" text-anchor="middle">lead by phone</text>
  </g>
  <g>
    <rect x="404" y="42" width="120" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="464" y="66" font-size="13" font-weight="600" fill="#0C447C" text-anchor="middle">AI Agent</text>
    <text x="464" y="83" font-size="11" fill="#2D6CB5" text-anchor="middle">qualifies (BANT)</text>
  </g>
  <g>
    <rect x="584" y="42" width="120" height="54" rx="8" fill="#E7F8EF" stroke="#1EA952"/>
    <text x="644" y="66" font-size="13" font-weight="600" fill="#0B6B38" text-anchor="middle">WhatsApp reply</text>
    <text x="644" y="83" font-size="11" fill="#1EA952" text-anchor="middle">agent answers</text>
  </g>

  <line x1="136" y1="69" x2="156" y2="69" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="69" x2="280" y2="69" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="384" y1="69" x2="404" y2="69" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="524" y1="69" x2="584" y2="69" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Band 2: the brain (sub-nodes on the agent) -->
  <text x="16" y="142" font-size="12" fill="#5e5e5e">THE BRAIN — attached to the AI Agent</text>

  <g>
    <rect x="300" y="156" width="124" height="50" rx="8" fill="#FBF1E6" stroke="#B5772D"/>
    <text x="362" y="178" font-size="12" font-weight="500" fill="#7C4F0C" text-anchor="middle">Chat model</text>
    <text x="362" y="194" font-size="11" fill="#B5772D" text-anchor="middle">OpenAI / Claude</text>
  </g>
  <g>
    <rect x="438" y="156" width="134" height="50" rx="8" fill="#FBF1E6" stroke="#B5772D"/>
    <text x="505" y="178" font-size="12" font-weight="500" fill="#7C4F0C" text-anchor="middle">Chat memory</text>
    <text x="505" y="194" font-size="11" fill="#B5772D" text-anchor="middle">Postgres · per phone</text>
  </g>
  <g>
    <rect x="586" y="156" width="124" height="50" rx="8" fill="#FBF1E6" stroke="#B5772D"/>
    <text x="648" y="178" font-size="12" font-weight="500" fill="#7C4F0C" text-anchor="middle">upsert_lead</text>
    <text x="648" y="194" font-size="11" fill="#B5772D" text-anchor="middle">tool → writes leads</text>
  </g>

  <line x1="464" y1="96" x2="362" y2="156" stroke="#b59b73" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="464" y1="96" x2="505" y2="156" stroke="#b59b73" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="464" y1="96" x2="648" y2="156" stroke="#b59b73" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Store band -->
  <g>
    <rect x="300" y="226" width="410" height="46" rx="8" fill="#F0F0EE" stroke="#6B6B6B"/>
    <text x="505" y="248" font-size="13" font-weight="500" fill="#2B2B2B" text-anchor="middle">Supabase (Postgres)</text>
    <text x="505" y="264" font-size="11" fill="#5E5E5E" text-anchor="middle">leads table (structured state) + whatsapp_memory (dialogue)</text>
  </g>
  <line x1="505" y1="206" x2="505" y2="226" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="648" y1="206" x2="600" y2="226" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Band 3: qualified-lead routing -->
  <text x="16" y="232" font-size="12" fill="#5e5e5e">QUALIFIED?</text>
  <g>
    <rect x="16" y="246" width="120" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="76" y="270" font-size="13" font-weight="500" fill="#0C447C" text-anchor="middle">Read stage</text>
    <text x="76" y="287" font-size="11" fill="#2D6CB5" text-anchor="middle">from leads</text>
  </g>
  <g>
    <rect x="16" y="312" width="120" height="36" rx="8" fill="#FDECEC" stroke="#C0392B"/>
    <text x="76" y="335" font-size="12" font-weight="600" fill="#922B21" text-anchor="middle">IF qualified → Slack</text>
  </g>
  <line x1="404" y1="69" x2="76" y2="246" stroke="#7390c2" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="76" y1="300" x2="76" y2="312" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
