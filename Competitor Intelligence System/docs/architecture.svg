<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>Competitor Intelligence System architecture</title>
  <desc>A daily crawl pipeline detects and summarizes competitor changes into a shared Supabase store; a weekly digest and an on-demand chat both read from that store.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7390c2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="46" y="30" font-size="12" fill="#5e5e5e">1 · DAILY CRAWL — runs every morning</text>

  <g>
    <rect x="46" y="44" width="108" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="100" y="68" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Schedule</text>
    <text x="100" y="84" font-size="12" fill="#2D6CB5" text-anchor="middle">daily 7am</text>
  </g>
  <g>
    <rect x="166" y="44" width="108" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="220" y="68" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Get list</text>
    <text x="220" y="84" font-size="12" fill="#2D6CB5" text-anchor="middle">competitors DB</text>
  </g>
  <g>
    <rect x="286" y="44" width="108" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="340" y="68" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Scrape</text>
    <text x="340" y="84" font-size="12" fill="#2D6CB5" text-anchor="middle">RSS·News·YT</text>
  </g>
  <g>
    <rect x="406" y="44" width="108" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="460" y="68" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Detect change</text>
    <text x="460" y="84" font-size="12" fill="#2D6CB5" text-anchor="middle">hash diff</text>
  </g>
  <g>
    <rect x="526" y="44" width="108" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="580" y="68" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">AI summarize</text>
    <text x="580" y="84" font-size="12" fill="#2D6CB5" text-anchor="middle">what changed</text>
  </g>

  <line x1="154" y1="70" x2="166" y2="70" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="274" y1="70" x2="286" y2="70" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="394" y1="70" x2="406" y2="70" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="514" y1="70" x2="526" y2="70" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="96" x2="580" y2="130" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="90" y="122" font-size="12" fill="#5e5e5e">SHARED STORE — Supabase</text>
  <g>
    <rect x="90" y="132" width="520" height="52" rx="8" fill="#F0F0EE" stroke="#6B6B6B"/>
    <text x="350" y="158" font-size="14" font-weight="500" fill="#2B2B2B" text-anchor="middle">Supabase store</text>
    <text x="350" y="174" font-size="12" fill="#5E5E5E" text-anchor="middle">change log + vector embeddings</text>
  </g>

  <line x1="210" y1="184" x2="210" y2="222" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="184" x2="490" y2="222" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="70" y="224" width="280" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="210" y="250" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">2 · Weekly brief</text>
    <text x="210" y="267" font-size="12" fill="#2D6CB5" text-anchor="middle">Mon 8am → Gmail + Slack</text>
  </g>
  <g>
    <rect x="370" y="224" width="240" height="54" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="490" y="250" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">3 · Ask-anything chat</text>
    <text x="490" y="267" font-size="12" fill="#2D6CB5" text-anchor="middle">RAG over your intel</text>
  </g>
</svg>
