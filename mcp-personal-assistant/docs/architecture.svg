<svg width="100%" viewBox="0 0 680 304" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>MCP Personal Assistant architecture</title>
  <desc>A chat agent reaches a reusable MCP server over HTTP Streamable; the server exposes eight tools (calendar, gmail, sheets, notes, web search, calculator).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7390c2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="46" y="26" font-size="12" fill="#5e5e5e">THE ASSISTANT — chat agent</text>

  <g>
    <rect x="46" y="40" width="104" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="98" y="64" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">User</text>
    <text x="98" y="80" font-size="12" fill="#2D6CB5" text-anchor="middle">chat</text>
  </g>
  <g>
    <rect x="164" y="40" width="124" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="226" y="64" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Chat Trigger</text>
    <text x="226" y="80" font-size="12" fill="#2D6CB5" text-anchor="middle">embeddable</text>
  </g>
  <g>
    <rect x="302" y="40" width="144" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="374" y="64" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">AI Agent</text>
    <text x="374" y="80" font-size="12" fill="#2D6CB5" text-anchor="middle">OpenAI + memory</text>
  </g>
  <g>
    <rect x="460" y="40" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="520" y="64" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">MCP Client</text>
    <text x="520" y="80" font-size="12" fill="#2D6CB5" text-anchor="middle">calls tools</text>
  </g>

  <line x1="150" y1="66" x2="164" y2="66" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="288" y1="66" x2="302" y2="66" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="446" y1="66" x2="460" y2="66" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="520" y1="92" x2="432" y2="150" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="486" y="120" font-size="12" fill="#5e5e5e">via MCP</text>

  <text x="240" y="138" font-size="12" fill="#5e5e5e">THE MCP SERVER — toolbox</text>
  <g>
    <rect x="240" y="150" width="200" height="46" rx="8" fill="#F0F0EE" stroke="#6B6B6B"/>
    <text x="340" y="172" font-size="14" font-weight="500" fill="#2B2B2B" text-anchor="middle">MCP Server Trigger</text>
    <text x="340" y="188" font-size="12" fill="#5E5E5E" text-anchor="middle">serves any MCP client</text>
  </g>

  <line x1="340" y1="196" x2="340" y2="212" stroke="#7390c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="46" y="216" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="115" y="235" font-size="12" fill="#0C447C" text-anchor="middle">Calendar (read)</text>
  </g>
  <g>
    <rect x="194" y="216" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="263" y="235" font-size="12" fill="#0C447C" text-anchor="middle">Calendar (create)</text>
  </g>
  <g>
    <rect x="342" y="216" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="411" y="235" font-size="12" fill="#0C447C" text-anchor="middle">Gmail (send)</text>
  </g>
  <g>
    <rect x="490" y="216" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="559" y="235" font-size="12" fill="#0C447C" text-anchor="middle">Sheets (read)</text>
  </g>
  <g>
    <rect x="46" y="254" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="115" y="273" font-size="12" fill="#0C447C" text-anchor="middle">Notes (save)</text>
  </g>
  <g>
    <rect x="194" y="254" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="263" y="273" font-size="12" fill="#0C447C" text-anchor="middle">Notes (recall)</text>
  </g>
  <g>
    <rect x="342" y="254" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="411" y="273" font-size="12" fill="#0C447C" text-anchor="middle">Web search</text>
  </g>
  <g>
    <rect x="490" y="254" width="138" height="30" rx="6" fill="#E6F1FB" stroke="#2D6CB5"/>
    <text x="559" y="273" font-size="12" fill="#0C447C" text-anchor="middle">Calculator</text>
  </g>
</svg>
