<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
    <style>
      .box  { rx:9; ry:9; fill:#ffffff; stroke-width:2; }
      .lbl  { font-size:13px; fill:#0f172a; font-weight:600; }
      .sub  { font-size:11px; fill:#64748b; }
      .tag  { font-size:12px; font-weight:700; fill:#ffffff; }
      .flow { stroke:#94a3b8; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="660" fill="#f7f8fa"/>
  <text x="30" y="40" font-size="22" font-weight="700" fill="#0f172a">Email Lead Qualifier</text>
  <text x="30" y="62" font-size="13" fill="#64748b">Inbound email → BANT scoring → hot / warm / dismiss → capture · auto-reply · track</text>

  <!-- Ingest + classify pipeline -->
  <g>
    <rect class="box" x="30"  y="92" width="168" height="58" stroke="#ea4335"/>
    <text class="lbl" x="46" y="118">Gmail Trigger</text>
    <text class="sub" x="46" y="136">is:unread -label:qualified</text>

    <rect class="box" x="238" y="92" width="168" height="58" stroke="#ea4335"/>
    <text class="lbl" x="254" y="118">Get a message</text>
    <text class="sub" x="254" y="136">Simplify OFF → full body</text>

    <rect class="box" x="446" y="92" width="168" height="58" stroke="#4b5563"/>
    <text class="lbl" x="462" y="118">Normalize</text>
    <text class="sub" x="462" y="136">from · subject · ids · body</text>

    <rect class="box" x="654" y="92" width="180" height="58" stroke="#10a37f"/>
    <text class="lbl" x="670" y="118">Information Extractor</text>
    <text class="sub" x="670" y="136">gpt-4o-mini · BANT + score</text>

    <rect class="box" x="874" y="92" width="150" height="58" stroke="#6b46c1"/>
    <text class="lbl" x="890" y="118">Switch</text>
    <text class="sub" x="890" y="136">on stage</text>
  </g>
  <path class="flow" d="M198,121 H238" marker-end="url(#arrow)"/>
  <path class="flow" d="M406,121 H446" marker-end="url(#arrow)"/>
  <path class="flow" d="M614,121 H654" marker-end="url(#arrow)"/>
  <path class="flow" d="M834,121 H874" marker-end="url(#arrow)"/>

  <!-- fan from switch down to three lanes -->
  <path class="flow" d="M949,150 V196 H60 V236" marker-end="url(#arrow)"/>
  <path class="flow" d="M949,150 V366 H60 V366" marker-end="url(#arrow)"/>
  <path class="flow" d="M949,150 V496 H60 V496" marker-end="url(#arrow)"/>

  <!-- HOT lane -->
  <rect x="24" y="242" width="70" height="26" rx="13" fill="#16a34a"/>
  <text class="tag" x="40" y="260">HOT</text>
  <g transform="translate(0,236)">
    <rect class="box" x="110" y="0" width="150" height="52" stroke="#2563eb"/>
    <text class="lbl" x="124" y="24">Upsert lead</text>
    <text class="sub" x="124" y="41">email_leads</text>

    <rect class="box" x="300" y="0" width="150" height="52" stroke="#611f69"/>
    <text class="lbl" x="314" y="24">Slack 🔥</text>
    <text class="sub" x="314" y="41">alert + reply link</text>

    <rect class="box" x="490" y="0" width="150" height="52" stroke="#ea4335"/>
    <text class="lbl" x="504" y="24">Add label</text>
    <text class="sub" x="504" y="41">qualified</text>

    <rect class="box" x="680" y="0" width="160" height="52" stroke="#10a37f"/>
    <text class="lbl" x="694" y="24">AI reply → send</text>
    <text class="sub" x="694" y="41">book-a-call tone</text>

    <rect class="box" x="880" y="0" width="150" height="52" stroke="#0f9d58"/>
    <text class="lbl" x="894" y="24">Append row</text>
    <text class="sub" x="894" y="41">lead tracker</text>
  </g>
  <path class="flow" d="M260,262 H300" marker-end="url(#arrow)"/>
  <path class="flow" d="M450,262 H490" marker-end="url(#arrow)"/>
  <path class="flow" d="M640,262 H680" marker-end="url(#arrow)"/>
  <path class="flow" d="M840,262 H880" marker-end="url(#arrow)"/>

  <!-- WARM lane -->
  <rect x="20" y="353" width="78" height="26" rx="13" fill="#d97706"/>
  <text class="tag" x="34" y="371">WARM</text>
  <g transform="translate(0,366)">
    <rect class="box" x="110" y="0" width="150" height="52" stroke="#2563eb"/>
    <text class="lbl" x="124" y="24">Upsert lead</text>
    <text class="sub" x="124" y="41">stage = unclear</text>

    <rect class="box" x="300" y="0" width="150" height="52" stroke="#611f69"/>
    <text class="lbl" x="314" y="24">Slack 🌤️</text>
    <text class="sub" x="314" y="41">"follow up"</text>

    <rect class="box" x="490" y="0" width="150" height="52" stroke="#ea4335"/>
    <text class="lbl" x="504" y="24">Add label</text>
    <text class="sub" x="504" y="41">qualified</text>

    <rect class="box" x="680" y="0" width="160" height="52" stroke="#10a37f"/>
    <text class="lbl" x="694" y="24">AI reply → send</text>
    <text class="sub" x="694" y="41">asks budget/timeline</text>

    <rect class="box" x="880" y="0" width="150" height="52" stroke="#0f9d58"/>
    <text class="lbl" x="894" y="24">Append row</text>
    <text class="sub" x="894" y="41">lead tracker</text>
  </g>
  <path class="flow" d="M260,392 H300" marker-end="url(#arrow)"/>
  <path class="flow" d="M450,392 H490" marker-end="url(#arrow)"/>
  <path class="flow" d="M640,392 H680" marker-end="url(#arrow)"/>
  <path class="flow" d="M840,392 H880" marker-end="url(#arrow)"/>

  <!-- DISMISS lane -->
  <rect x="14" y="483" width="90" height="26" rx="13" fill="#64748b"/>
  <text class="tag" x="26" y="501">DISMISS</text>
  <rect class="box" x="110" y="470" width="180" height="52" stroke="#94a3b8"/>
  <text class="lbl" x="124" y="494">Mark as read</text>
  <text class="sub" x="124" y="511">not_qualified / spam</text>

  <text x="30" y="600" font-size="12" fill="#94a3b8">Single workflow · n8n Cloud · OpenAI gpt-4o-mini · Supabase Postgres · Gmail · Slack · Google Sheets</text>
</svg>
